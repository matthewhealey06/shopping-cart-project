<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Project</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav>
        <a href=""><img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Logo_TV_2015.png" alt=""></a>
    </nav>
    <div class="wrapper">
        <div class="title">
            <h1>SHOPPING CART</h1>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="page-right">
            <div class="order-summary" id="order-summary">
                <h3>ORDER SUMMARY</h3>
                <p id="sub-total">SUB-TOTAL</p>
                <p id="shipping">SHIPPING</p>
                <p id="total">TOTAL</p>
                <button class="checkout">CHECK OUT</button>
            </div>
            <p class="free-shipping">FREE-SHIPPING OVER £100</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
